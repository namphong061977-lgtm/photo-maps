<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bản đồ Quán Phá Lấu Bò</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* Tiêu đề */
        .title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(139, 69, 19, 0.95);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            z-index: 1000;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Nút quay về vị trí quán */
        .recenter-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: #ffffff;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            font-size: 14px;
        }

        .recenter-btn:hover {
            background: #f1f1f1;
        }

        /* Popup */
        .popup-content {
            text-align: center;
            max-width: 260px;
        }

        .popup-content img {
            width: 100%;
            border-radius: 10px;
            margin-top: 8px;
        }

        .address {
            font-size: 13px;
            color: #555;
            margin: 6px 0;
        }

        .caption {
            font-size: 14px;
            color: #333;
            font-style: italic;
            margin: 8px 0;
        }

        .nav-buttons {
            margin-top: 6px;
        }

        .nav-buttons button {
            padding: 5px 10px;
            margin: 0 5px;
            border: none;
            background-color: #8B4513;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .nav-buttons button:hover {
            background-color: #a0522d;
        }

        .map-link {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 10px;
            background-color: #d35400;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
        }

        .map-link:hover {
            background-color: #e67e22;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 13px;
                padding: 6px 12px;
            }

            .recenter-btn {
                font-size: 12px;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="title">🍲 Quán Phá Lấu Bò - Hẻm 243 Tôn Đản</div>
    <div id="map"></div>
    <button class="recenter-btn" onclick="recenterMap()">📍 Về vị trí quán</button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // =========================
        // 1. Tọa độ quán
        // =========================
        const latitude = 10.756186685190368;
        const longitude = 106.7071452492838;

        // =========================
        // 2. Khởi tạo bản đồ
        // =========================
        const map = L.map('map').setView([latitude, longitude], 17);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // =========================
        // 3. Danh sách hình ảnh
        // =========================
        const images = [
            "phalau1.jpg", "phalau2.jpg", "phalau3.jpg", "phalau4.jpg",
            "phalau5.jpg", "phalau6.jpg", "phalau7.jpg", "phalau8.jpg",
            "phalau9.jpg", "phalau10.jpg", "phalau11.jpg", "phalau12.jpg",
            "phalau13.jpg", "phalau14.jpg", "phalau15.jpg", "phalau16.jpg",
            "phalau17.jpg", "phalau18.jpg", "phalau19.jpg", "phalau20.jpg",
            "phalau21.jpg", "phalau22.jpg", "phalau23.jpg", "phalau24.jpg"
        ];

        let currentImageIndex = 0;
        let slideshowInterval = null;

        // =========================
        // 4. Marker dạng ghim đỏ
        // =========================
        const redIcon = L.icon({
            iconUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon.png",
            shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const marker = L.marker([latitude, longitude], { icon: redIcon })
            .addTo(map)
            .bindPopup(createPopupContent())
            .openPopup();

        // =========================
        // 5. Nội dung Popup
        // =========================
        function createPopupContent() {
            const googleMapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;

            return `
                <div class="popup-content">
                    <h3>Quán Phá Lấu Bò</h3>
                    <img id="popupImage" src="${images[currentImageIndex]}" alt="Phá lấu bò">
                    <p class="address">📍 Hẻm 243 Tôn Đản, TP. Hồ Chí Minh</p>
                    <p class="caption">
                        "Hương vị phá lấu đậm đà, chuẩn vị truyền thống, được gìn giữ qua năm tháng, thu hút thực khách gần xa."
                    </p>
                    <div class="nav-buttons">
                        <button onclick="prevImage()">⬅️</button>
                        <button onclick="nextImage()">➡️</button>
                    </div>
                    <a href="${googleMapsLink}" target="_blank" class="map-link">
                        📌 Mở trên Google Maps
                    </a>
                </div>
            `;
        }

        // =========================
        // 6. Điều khiển slideshow
        // =========================
        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            document.getElementById("popupImage").src = images[currentImageIndex];
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            document.getElementById("popupImage").src = images[currentImageIndex];
        }

        marker.on('popupopen', function () {
            slideshowInterval = setInterval(nextImage, 3000);
        });

        marker.on('popupclose', function () {
            clearInterval(slideshowInterval);
        });

        // =========================
        // 7. Nút quay về vị trí quán
        // =========================
        function recenterMap() {
            map.setView([latitude, longitude], 17, {
                animate: true,
                duration: 1.5
            });
            marker.openPopup();
        }

        // =========================
        // 8. Tự động zoom về quán khi đi quá xa
        // =========================
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lng2 - lng1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ / 2) * Math.sin(Δλ / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        const MAX_DISTANCE = 2000; // 2 km

        map.on('moveend', function () {
            const center = map.getCenter();
            const distance = calculateDistance(
                center.lat,
                center.lng,
                latitude,
                longitude
            );

            if (distance > MAX_DISTANCE) {
                map.setView([latitude, longitude], 17, {
                    animate: true,
                    duration: 1.5
                });
                marker.openPopup();
            }
        });
    </script>

</body>
</html>

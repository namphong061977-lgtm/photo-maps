<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bản đồ ảnh của tôi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        /* Làm cho bản đồ chiếm toàn màn hình */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* Tiêu đề */
        .title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 18px;
            border-radius: 20px;
            z-index: 1000;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="title">📸 Bản đồ ảnh của tôi</div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // Khởi tạo bản đồ tại TP. Hồ Chí Minh
        var map = L.map('map').setView([10.8231, 106.6297], 13);

        // Thêm lớp bản đồ từ OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Thêm một marker mẫu (Chợ Bến Thành)
        L.marker([10.7725484, 106.6979886])
            .addTo(map)
            .bindPopup("<b>Chợ Bến Thành</b><br>Đây là vị trí mẫu.")
            .openPopup();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bản đồ ảnh của tôi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Nhúng Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        #map {
            height: 90vh;
        }
        .leaflet-popup-content img {
            width: 250px;
            border-radius: 8px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h2>📸 Bản đồ ảnh dự án</h2>
        <p>Nhấn vào các điểm trên bản đồ để xem ảnh</p>
    </header>

    <!-- Khu vực hiển thị bản đồ -->
    <div id="map"></div>

    <!-- Nhúng Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // Khởi tạo bản đồ tại Chợ Bến Thành
        var map = L.map('map').setView([10.7725484, 106.6979886], 15);

        // Thêm lớp bản đồ từ OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Marker cho Chợ Bến Thành
        L.marker([10.772548408659665, 106.69798860905667])
            .addTo(map)
            .bindPopup(`
                <h3>Chợ Bến Thành</h3>
                <img src="Ben_Thanh_market_2.jpg" alt="Chợ Bến Thành">
                <p>Một trong những biểu tượng nổi tiếng của TP. Hồ Chí Minh.</p>
            `)
            .openPopup();
    </script>
</body>
</html>

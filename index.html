<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bản đồ ảnh dự án</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS riêng -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

    <!-- Tiêu đề mobile -->
    <div id="mobileHeader">📸 Bản đồ ảnh</div>

    <!-- Bản đồ -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // Khởi tạo map
        var map = L.map('map').setView([10.7725484, 106.6979886], 15);

        // Layer bản đồ
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Dữ liệu địa điểm
        const locations = [
            {
                name: "Chợ Bến Thành",
                lat: 10.772548408659665,
                lng: 106.69798860905667,
                description: "Biểu tượng nổi tiếng của TP.HCM.",
                image: "Ben_Thanh_market_2.jpg"
            }
        ];

        const markers = [];

        // Hàm resize ảnh theo zoom
        function getImageSize(zoom) {
            return Math.min(320, Math.max(120, zoom * 18));
        }

        function createPopup(loc) {
            const size = getImageSize(map.getZoom());
            return `
                <h3>${loc.name}</h3>
                <img src="${loc.image}" width="${size}">
                <p>${loc.description}</p>
            `;
        }

        // Tạo marker
        locations.forEach(loc => {
            const marker = L.marker([loc.lat, loc.lng]).addTo(map);
            marker.bindPopup(createPopup(loc));
            markers.push({ marker, loc });
        });

        // Update khi zoom
        map.on('zoomend', () => {
            markers.forEach(item => {
                item.marker.setPopupContent(createPopup(item.loc));
                if (item.marker.isPopupOpen()) {
                    item.marker.openPopup();
                }
            });
        });
    </script>

</body>
</html>
